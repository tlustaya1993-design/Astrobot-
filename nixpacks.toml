[phases.setup]
# python3 + gcc + gnumake are required by node-gyp to compile swisseph-v2
# (Swiss Ephemeris native addon). Without them pnpm install fails at the
# C compilation step.
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["npm install -g pnpm@9", "pnpm install --frozen-lockfile=false"]

[phases.build]
dependsOn = ["install"]
cmds = ["BASE_PATH=/ pnpm --filter @workspace/astrobot run build", "pnpm --filter @workspace/api-server run build"]

[start]
cmd = "for i in 1 2 3 4 5; do pnpm --filter @workspace/db run push:ci && break || sleep 10; done && NODE_ENV=production pnpm --filter @workspace/api-server run start"
