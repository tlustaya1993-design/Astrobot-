[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["npm install -g pnpm@9"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile=false"]

[phases.build]
cmds = ["BASE_PATH=/ pnpm --filter @workspace/astrobot run build && pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/db run push && NODE_ENV=production pnpm --filter @workspace/api-server run start"
