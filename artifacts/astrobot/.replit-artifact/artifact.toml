kind = "web"
previewPath = "/"
title = "AstroBot"
version = "1.0.0"
id = "artifacts/astrobot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25482

[services.development]
run = "pnpm --filter @workspace/astrobot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astrobot", "run", "build" ]
publicDir = "artifacts/astrobot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25482"
BASE_PATH = "/"
