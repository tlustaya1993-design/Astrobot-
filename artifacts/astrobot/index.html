<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0a0a14" />
    <meta name="description" content="AstroBot — твой личный AI-астролог. Живой диалог, натальная карта, транзиты и персональные советы." />
    <!-- Open Graph / мессенджеры (VK, Telegram, WhatsApp и др.) — og:image подставляется при сборке, см. VITE_PUBLIC_ORIGIN в vite.config -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AstroBot — Твой личный астролог" />
    <meta property="og:description" content="Твой личный астролог в твоём телефоне. Натальная карта, транзиты и ответы звёзд в живом диалоге." />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AstroBot — спроси звёзды: натальная карта и персональный AI-астролог" />
    <meta property="og:locale" content="ru_RU" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AstroBot — Твой личный астролог" />
    <meta name="twitter:description" content="Твой личный астролог в твоём телефоне. Натальная карта, транзиты и ответы звёзд в живом диалоге." />
    <meta name="twitter:image" content="__OG_IMAGE__" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="AstroBot" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <title>AstroBot — Твой личный астролог</title>
    <!-- Маленькие размеры первыми — вкладка берёт 32/48, иначе 512 сжимается до «точки» -->
    <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-48.png" sizes="48x48" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="512x512" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const SW_VERSION = 'v11';
          const stored = localStorage.getItem('sw_version');
          if (stored !== SW_VERSION) {
            // New version: unregister old SWs and purge all caches
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.unregister()));
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
            localStorage.setItem('sw_version', SW_VERSION);
          }
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(console.error);
        });
      }
    </script>
  </body>
</html>
