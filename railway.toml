[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile=false && BASE_PATH=/ pnpm --filter @workspace/astrobot run build && pnpm --filter @workspace/api-server run build"

[deploy]
releaseCommand = "pnpm --filter @workspace/db run push"
startCommand = "pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
