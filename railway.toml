[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@9 && pnpm install --frozen-lockfile=false && BASE_PATH=/ pnpm --filter @workspace/astrobot run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "for i in 1 2 3 4 5; do pnpm --filter @workspace/db run push && break || sleep 10; done && NODE_ENV=production pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
