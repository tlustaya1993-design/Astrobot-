[build]
buildCommand = "pnpm install && BASE_PATH=/ pnpm --filter @workspace/astrobot run build && pnpm --filter @workspace/api-server run build"

[deploy]
releaseCommand = "pnpm --filter @workspace/db run push"
startCommand = "NODE_ENV=production pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
