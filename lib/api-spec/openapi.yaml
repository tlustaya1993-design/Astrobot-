openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AstroBot API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: upsertMe
      tags: [users]
      summary: Create or update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    put:
      operationId: updateOpenaiConversation
      tags: [openai]
      summary: Update conversation title
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOpenaiConversationBody"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOpenaiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOpenaiImageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        name:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        birthTime:
          type: string
          nullable: true
        birthTimeUnknown:
          type: boolean
          nullable: true
        birthPlace:
          type: string
          nullable: true
        birthLat:
          type: number
          format: double
          nullable: true
        birthLng:
          type: number
          format: double
          nullable: true
        gender:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        onboardingDone:
          type: boolean
        tonePreferredDepth:
          type: string
          nullable: true
        tonePreferredStyle:
          type: string
          nullable: true
        toneEmotionalSensitivity:
          type: string
          nullable: true
        toneFamiliarityLevel:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - onboardingDone
        - createdAt
        - updatedAt

    UpsertUserBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        birthTime:
          type: string
          nullable: true
        birthTimeUnknown:
          type: boolean
          nullable: true
        birthPlace:
          type: string
          nullable: true
        birthLat:
          type: number
          format: double
          nullable: true
        birthLng:
          type: number
          format: double
          nullable: true
        gender:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        onboardingDone:
          type: boolean
          nullable: true
        tonePreferredDepth:
          type: string
          nullable: true
        tonePreferredStyle:
          type: string
          nullable: true
        toneEmotionalSensitivity:
          type: string
          nullable: true
        toneFamiliarityLevel:
          type: string
          nullable: true

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        title:
          type: string
        contactId:
          type: integer
          nullable: true
        contactExtendedMode:
          type: boolean
          description: Расширенный разбор по контакту (×2 запроса за сообщение при активном контакте)
        createdAt:
          type: string
          format: date-time
        contactName:
          type: string
          nullable: true
        contactRelation:
          type: string
          nullable: true
        contactAvatarConfig:
          nullable: true
          type: object
          properties:
            archetype:
              type: string
            hairStyle:
              type: string
            hairColor:
              type: string
            robeColor:
              type: string
            eyeColor:
              type: string
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    UpdateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
        contactExtendedMode:
          type: boolean

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
        sessionId:
          type: string
        contactId:
          type: integer
        contactExtendedMode:
          type: boolean
      required:
        - content
        - sessionId

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        title:
          type: string
        contactId:
          type: integer
          nullable: true
        contactExtendedMode:
          type: boolean
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    GenerateOpenaiImageBody:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt

    GenerateOpenaiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
